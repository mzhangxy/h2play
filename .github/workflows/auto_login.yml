name: Auto Login Script

# 配置触发条件
on:
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击运行
  schedule:
    # 定时任务：每天的 UTC 时间 00:00 运行一次 (根据需要修改 cron 表达式)
    - cron: '0 0 * * *'

jobs:
  run-login:
    runs-on: ubuntu-latest # 使用 Ubuntu 环境，方便安装 xvfb 和 ffmpeg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # 拉取仓库代码到当前运行环境

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 推荐使用 3.10 或更高版本

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # 安装虚拟桌面 xvfb 和音频处理工具 ffmpeg
          sudo apt-get install -y xvfb ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # 安装脚本所需的全部 Python 库
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: Run Login Script
        env:
          # 将 GitHub Secrets 映射为环境变量，供 Python 脚本中的 os.getenv() 读取
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        # 假设您的 Python 脚本命名为 login.py，请根据实际文件名修改
        run: python login.py
