name: Auto Login Script

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-login:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip

      # ==========================================
      # 新增：下载并后台运行 V2ray 核心
      # ==========================================
      - name: Install and Run V2ray
        env:
          V2RAY_CONFIG: ${{ secrets.V2RAY_CONFIG }}
        run: |
          echo "⬇️ 正在下载 V2ray-core..."
          wget -q https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip
          unzip -q v2ray-linux-64.zip -d v2ray_bin
          
          echo "📝 正在写入节点配置..."
          echo "$V2RAY_CONFIG" > v2ray_bin/config.json
          
          echo "🚀 正在后台启动 V2ray..."
          nohup ./v2ray_bin/v2ray run -c ./v2ray_bin/config.json > v2ray.log 2>&1 &
          
          echo "⏳ 等待 V2ray 核心启动 (5秒)..."
          sleep 5
          
          echo "🌐 测试 V2ray 本地 HTTP 代理 (127.0.0.1:10809) 连通性..."
          curl -x http://127.0.0.1:10809 -I -s https://www.google.com/generate_204 || echo "⚠️ 代理测试未通过，请检查节点配置！"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: Run Login Script
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        run: python login.py 

      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: debug-screenshots 
          path: ./*.png 
          retention-days: 5
